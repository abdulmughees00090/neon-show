  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      cursor: none;
      font-family: 'Georgia', serif;
    }

    /* Show real cursor on overlays and interactive elements */
    #tutorial,
    #pay-overlay,
    #tutorial *,
    #pay-overlay * {
      cursor: auto !important;
    }
    #tutorial .tut-btn,
    #pay-overlay button,
    #pay-overlay .pay-amount-btn,
    #pay-overlay .pay-confirm-btn,
    #pay-overlay .pay-close {
      cursor: pointer !important;
    }
    #mute-btn,
    #footer-links a {
      cursor: pointer !important;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 0;
    }

    /* ── Wandering sentence ── */
    .wandering-sentence {
      position: fixed;
      font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
      font-weight: 400;
      /* Mobile-first small, scales up */
      font-size: clamp(0.75rem, 2.5vw, 1.6rem);
      color: #000;
      /* Prevent overflow on mobile */
      max-width: 88vw;
      white-space: normal;
      word-break: break-word;
      text-align: center;
      line-height: 1.4;
      letter-spacing: 0.02em;
      z-index: 10;
      user-select: none;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease, text-shadow 2s ease;
      text-shadow: none;
      transform: translate(-50%, -50%);
    }
    .wandering-sentence.alive {
      opacity: 1;
    }
    .wandering-sentence.revealed {
      text-shadow:
        0 0 6px rgba(255,255,255,0.95),
        0 0 18px rgba(255,255,255,0.65),
        0 0 36px rgba(180,220,255,0.45);
    }

    /* ── Custom cursor dot (hidden on overlays via body rule) ── */
    #cursor-dot {
      position: fixed;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #fff;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 30;
      box-shadow: 0 0 6px 2px rgba(255,255,255,0.8);
      transition: background 0.3s, box-shadow 0.3s;
    }

    /* ── Tutorial overlay ── */
    #tutorial {
      position: fixed;
      inset: 0;
      background: rgba(3,3,3,0.94);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: tutFadeIn 1.2s ease forwards;
    }
    #tutorial.hiding {
      animation: tutFadeOut 1s ease forwards;
      pointer-events: none;
    }
    @keyframes tutFadeIn  { from { opacity:0 } to { opacity:1 } }
    @keyframes tutFadeOut { from { opacity:1 } to { opacity:0 } }

    .tut-inner {
      max-width: 480px;
      width: 88%;
      text-align: center;
      padding: 48px 36px 52px;
      border-radius: 4px;
      background: rgba(6,6,6,0.85);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }
    .tut-inner::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 5px;
      background: conic-gradient(from 0deg, #ff00cc, #00ffee, #ffe566, #ff6600, #cc00ff, #ff00cc);
      z-index: -1;
      animation: spinBorder 6s linear infinite;
      opacity: 0.5;
    }
    .tut-inner::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 4px;
      background: rgba(4,4,4,0.97);
      z-index: -1;
    }
    @keyframes spinBorder { to { transform: rotate(360deg); } }

    .tut-glyph {
      font-size: 1.8rem;
      margin-bottom: 24px;
      display: block;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.6em;
      animation: glyphFade 3s ease-in-out infinite;
    }
    @keyframes glyphFade {
      0%,100% { opacity: 0.15; }
      50%      { opacity: 0.55; }
    }

    .tut-line1 {
      font-family: 'Georgia', serif;
      font-size: clamp(1rem, 3vw, 1.45rem);
      font-weight: 400;
      font-style: italic;
      color: rgba(255,255,255,0.7);
      margin-bottom: 10px;
      line-height: 1.75;

    .tut-line2 {
      font-family: Arial, sans-serif;

      color: rgba(255,255,255,0.28);
      margin-bottom: 40px;
      letter-spacing: 0.1em;
    }

    .tut-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.55);
      padding: 13px 44px;
      border-radius: 40px;
      font-family: 'Georgia', serif;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s, color 0.4s, box-shadow 0.4s;
    }
    .tut-btn:hover {
      border-color: rgba(0,255,238,0.5);
      color: rgba(255,255,255,0.88);
      box-shadow: 0 0 20px rgba(0,255,238,0.15);
    }

    /* ── Payment entity (dynamic, JS-placed) ── */
    #pay-entity-dyn {
      position: fixed;
      font-family: 'Georgia', serif;
      font-size: clamp(0.6rem, 1.5vw, 0.88rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #000;
      z-index: 12;
      user-select: none;
      padding: 10px 22px;
      border: 1px solid #000;
      border-radius: 40px;
      transform: translate(-50%, -50%);
      transition: opacity 4s ease, color 2s ease, border-color 2s ease, box-shadow 2s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      cursor: pointer !important;
      /* never overflow on mobile */
      max-width: 80vw;
    }

    /* ── Payment overlay ── */
    #pay-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px);

    .pay-modal {

      content: '';

    .pay-amounts {
      display: flex;

      justify-content: center;

    }
    .pay-amount-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.55);
      padding: 9px 20px;
      border-radius: 40px;
      font-family: 'Georgia', serif;
      font-size: 0.9rem;
      transition: all 0.3s;
      letter-spacing: 0.05em;
    }
    .pay-amount-btn:hover, .pay-amount-btn.active {
      border-color: rgba(0,200,255,0.6);
      color: #fff;
      box-shadow: 0 0 16px rgba(0,200,255,0.2);
    }
    .pay-confirm-btn {
      background: transparent;
      border: 1px solid rgba(0,200,255,0.4);
      color: rgba(255,255,255,0.7);
      padding: 13px 44px;
      border-radius: 40px;
      font-family: 'Georgia', serif;
      font-size: 0.88rem;
      letter-spacing: 0.16em;
      width: 100%;
      transition: all 0.4s;
      margin-bottom: 18px;
    }
    .pay-confirm-btn:hover {
      border-color: rgba(0,200,255,0.85);
      box-shadow: 0 0 24px rgba(0,200,255,0.28);
      color: #fff;
    }
    .pay-close {
      font-family: Arial, sans-serif;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.14);
      letter-spacing: 0.14em;
      background: none;
      border: none;
      transition: color 0.3s;
    }
    .pay-close:hover { color: rgba(255,255,255,0.4); }

    /* ── Mute button ── */
    #mute-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 50;
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.2);
      font-family: Arial, sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      padding: 7px 14px;
      border-radius: 40px;
      transition: all 0.3s;
    }
    #mute-btn:hover {
      border-color: rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.5);
    }

    /* ── Footer links ── */
    #footer-links {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #footer-links a {
      background: none;
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.18);
      font-family: Arial, sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      padding: 5px 10px;
      border-radius: 40px;

      transition: all 0.3s;

    #footer-links a:hover {
      border-color: rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.5);
    }

    /* ── Session glyph ── */
    #session-glyph {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 50;
      color: rgba(255,255,255,0.04);
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      font-family: 'Georgia', serif;
      pointer-events: none;
      transition: color 2s ease;
    }

    /* ── Mobile adjustments ── */
    @media (max-width: 480px) {
      .tut-inner { padding: 36px 24px 40px; }
      .pay-modal { padding: 36px 24px 40px; }
      #footer-links { bottom: 56px; }
      #mute-btn { bottom: 20px; right: 12px; }
      #session-glyph { display: none; }
    }
  </style>

<script>
(function () {
  'use strict';

  /* ═══════════════════════════════════
     TUTORIAL
  ═══════════════════════════════════ */
  const STORAGE_KEY = 'neonDream_v4';
  const tutEl  = document.getElementById('tutorial');
  const tutBtn = document.getElementById('tut-enter');

  // Hide custom cursor dot when over overlays
  const cursorDot = document.getElementById('cursor-dot');

  function hideTutorial() {
    tutEl.classList.add('hiding');
    setTimeout(() => { tutEl.style.display = 'none'; startAudio(); }, 1000);
    try { localStorage.setItem(STORAGE_KEY, '1'); } catch(_){}
  }
  tutBtn.addEventListener('click', hideTutorial);
  try { if (localStorage.getItem(STORAGE_KEY)) { setTimeout(hideTutorial, 400); } } catch(_){}

  /* ═══════════════════════════════════
     CANVAS
  ═══════════════════════════════════ */
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H;
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); });

  /* ═══════════════════════════════════
     POINTER TRACKING
  ═══════════════════════════════════ */
  let mx = W / 2, my = H / 2;
  let pmx = mx, pmy = my;
  let pointerSpeed = 0;
  let isTouch = false;

  function onPointerMove(cx, cy) {
    pmx = mx; pmy = my;
    mx = cx; my = cy;
    pointerSpeed = Math.hypot(mx - pmx, my - pmy);
    cursorDot.style.left = mx + 'px';
    cursorDot.style.top  = my + 'px';
  }

  window.addEventListener('mousemove', e => {
    isTouch = false;
    onPointerMove(e.clientX, e.clientY);
    // Hide dot when over an overlay
    const overOverlay = tutEl.style.display !== 'none' && tutEl.offsetParent !== null
      || document.getElementById('pay-overlay').classList.contains('open');
    cursorDot.style.opacity = overOverlay ? '0' : '1';
  });
  window.addEventListener('touchmove', e => {
    isTouch = true;
    if (!document.getElementById('pay-overlay').classList.contains('open')) {
      e.preventDefault();
    }
    const t = e.touches[0];
    onPointerMove(t.clientX, t.clientY);
  }, { passive: false });
  window.addEventListener('touchstart', e => {
    isTouch = true;
    const t = e.touches[0];
    onPointerMove(t.clientX, t.clientY);
  }, { passive: true });

  /* On touch devices, hide the fake cursor dot */
  if ('ontouchstart' in window) cursorDot.style.display = 'none';

  /* ═══════════════════════════════════
     SESSION DURATION
  ═══════════════════════════════════ */
  const sessionStart = Date.now();
  function sessionMinutes() { return (Date.now() - sessionStart) / 60000; }
  function sessionIntensity() { return Math.min(1, sessionMinutes() / 10); }

  /* ═══════════════════════════════════
     ORB SYSTEM
  ═══════════════════════════════════ */
  const TRAIL_LEN    = 52;
  const N_ORBS       = 8;
  const SPAWN_SPREAD = 200;

  function randHue() { return Math.random() * 360; }

  class Orb {
    constructor() { this.reset(true); }
    reset(first = false) {
      this.x = first ? Math.random() * W : mx + (Math.random() - 0.5) * SPAWN_SPREAD;
      this.y = first ? Math.random() * H : my + (Math.random() - 0.5) * SPAWN_SPREAD;
      this.hue         = randHue();
      this.hueSpeed    = (Math.random() - 0.5) * 1.4;
      this.size        = 3 + Math.random() * 6;
      this.speed       = 0.028 + Math.random() * 0.042;
      this.wander      = Math.random() * Math.PI * 2;
      this.wanderSpeed = (Math.random() - 0.5) * 0.08;
      this.wanderAmp   = 70 + Math.random() * 140;
      this.trail = [];
      for (let i = 0; i < TRAIL_LEN; i++) this.trail.push({ x: this.x, y: this.y });
    }
    update(energyBoost) {
      this.wander += this.wanderSpeed;
      const amp = this.wanderAmp * (1 + energyBoost * 1.4);
      const tx = mx + Math.cos(this.wander)       * amp * 0.5;
      const ty = my + Math.sin(this.wander * 1.3) * amp * 0.4;
      const spd = this.speed * (1 + energyBoost * 0.8);
      this.x += (tx - this.x) * spd;
      this.y += (ty - this.y) * spd;
      this.hue = (this.hue + this.hueSpeed + 360) % 360;
      this.trail.unshift({ x: this.x, y: this.y });
      if (this.trail.length > TRAIL_LEN) this.trail.pop();
    }
    draw(energyBoost) {
      const h    = this.hue;
      const blur = 18 + energyBoost * 24;
      for (let i = 1; i < this.trail.length; i++) {
        const t   = (this.trail.length - i) / this.trail.length;
        const seg = this.trail[i];
        ctx.save();
        ctx.beginPath();
        ctx.arc(seg.x, seg.y, Math.max(0.1, this.size * t * 0.9), 0, Math.PI * 2);
        ctx.fillStyle   = `hsla(${h},100%,60%,${t * t * 0.9})`;
        ctx.shadowColor = `hsl(${h},100%,55%)`;
        ctx.shadowBlur  = blur * t;
        ctx.fill();
        ctx.restore();
      }
      const r = this.size * (3.5 + energyBoost * 2);
      const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
      g.addColorStop(0,   `hsla(${h},100%,90%,1)`);
      g.addColorStop(0.3, `hsla(${h},100%,60%,0.7)`);
      g.addColorStop(1,   `hsla(${h},100%,50%,0)`);
      ctx.save();
      ctx.beginPath();
      ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
      ctx.fillStyle   = g;
      ctx.shadowColor = `hsl(${h},100%,60%)`;
      ctx.shadowBlur  = 30 + energyBoost * 40;
      ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
      ctx.fillStyle   = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur  = 14;
      ctx.fill();
      ctx.restore();
    }
  }

  const orbs = Array.from({ length: N_ORBS }, () => new Orb());

  /* ═══════════════════════════════════
     SPARKLES
  ═══════════════════════════════════ */
  const sparkles = Array.from({ length: 60 }, () => ({
    x:     Math.random() * 1920,
    y:     Math.random() * 1080,
    hue:   randHue(),
    alpha: Math.random() * 0.3 + 0.03,
    speed: (Math.random() - 0.5) * 0.007,
    r:     0.5 + Math.random() * 1.6,
  }));

  function drawSparkles() {
    for (const s of sparkles) {
      s.alpha += s.speed;
      if (s.alpha <= 0.02 || s.alpha >= 0.38) s.speed *= -1;
      ctx.save();
      ctx.globalAlpha = s.alpha;
      ctx.beginPath();
      ctx.arc((s.x / 1920) * W, (s.y / 1080) * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle   = `hsl(${s.hue},100%,70%)`;
      ctx.shadowColor = `hsl(${s.hue},100%,60%)`;
      ctx.shadowBlur  = 8;
      ctx.fill();
      ctx.restore();
    }
  }

  /* ═══════════════════════════════════
     DISSOLUTION PARTICLES
  ═══════════════════════════════════ */
  const dissParticles = [];

  function spawnDissolution(x, y, text, hue) {
    const count = 28 + Math.floor(text.length * 1.1);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = 0.3 + Math.random() * 1.4;
      dissParticles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - 0.5,
        alpha: 0.8 + Math.random() * 0.2,
        r: 1 + Math.random() * 2.5,
        hue: hue + (Math.random() - 0.5) * 40,
        life: 1,
        decay: 0.012 + Math.random() * 0.018,
      });
    }
  }

  function updateDrawDiss() {
    for (let i = dissParticles.length - 1; i >= 0; i--) {
      const p = dissParticles[i];
      p.x    += p.vx;
      p.y    += p.vy;
      p.vy   += 0.015;
      p.life -= p.decay;
      if (p.life <= 0) { dissParticles.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = p.life * p.alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fillStyle   = `hsl(${p.hue},100%,75%)`;
      ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
      ctx.shadowBlur  = 6;
      ctx.fill();
      ctx.restore();
    }
  }

  /* ═══════════════════════════════════
     REVEAL HIT-TEST
  ═══════════════════════════════════ */
  function isRevealedByPointer(el) {
    if (!el) return false;
    const r = el.getBoundingClientRect();
    const pad = isTouch ? 55 : 90;
    return mx >= r.left - pad && mx <= r.right  + pad &&
           my >= r.top  - pad && my <= r.bottom + pad;
  }

  /* ═══════════════════════════════════
     SENTENCE POOLS — emotionally grouped
  ═══════════════════════════════════ */

  // Phase 1: Boredom / arrival (0–2 min)
  const SENTENCES_BOREDOM = [
    "You opened this because something was missing.",
    "This is what boredom looks like when it breathes.",
    "You didn't know what you were looking for.",
    "The night gets quiet in a specific way.",
    "You needed somewhere to put your attention.",
    "Most people scroll. You stopped here.",
    "This is the gap between one thought and the next.",
    "You found this at the right kind of wrong time.",
    "Your mind needed somewhere to rest.",
    "Boredom is just the mind asking for more.",
  ];

  // Phase 2: Recognition / thought spiral (2–5 min)
  const SENTENCES_THOUGHT = [
    "You are thinking about something you haven't said.",
    "Some thoughts only exist when nobody's watching.",
    "The thing you keep coming back to — it matters.",
    "You stayed because something here felt familiar.",
    "This is what a thought looks like before it has words.",
    "You're not distracted. You're processing.",
    "Some people never stop to feel this.",
    "The mind in motion is always searching for something.",
    "You hover like you're deciding something.",
    "You almost left. But you didn't.",
    "There's something you've been meaning to figure out.",
    "You came for nothing and found something quieter.",
  ];

  // Phase 3: Deep presence / emotional (5–8 min)
  const SENTENCES_PRESENCE = [
    "You have been here long enough to know this matters.",
    "The lights remember every cursor that passed through.",
    "Nobody knows you are here. That's the point.",
    "Some people keep things alive just by staying.",
    "You would have paid if this were a film.",
    "A stranger already kept this alive for you.",
    "You are the reason the lights are still on.",
    "The dream only exists because someone stayed.",
    "This light costs someone something real.",
    "Staying is a form of care most people forget.",
  ];

  // Phase 4: Late / accountability (8+ min)
  const SENTENCES_LATE = [
    "You have been here long enough to owe this something.",
    "Most people left before understanding. You didn't.",
    "You stayed through the quiet and the dark.",
    "The ones who stay this long always feel it.",
    "This website remembers hesitation. And generosity.",
    "Nobody will know you were here unless you leave something.",
    "You could have done more. You still can.",
    "Someone already did. You could be next.",
    "The lights dim when nobody feeds them.",
    "You are the last one watching. Make it mean something.",
  ];

  function getSentencePool() {
    const m = sessionMinutes();
    if (m < 2)  return SENTENCES_BOREDOM;
    if (m < 5)  return [...SENTENCES_BOREDOM, ...SENTENCES_THOUGHT];
    if (m < 8)  return [...SENTENCES_THOUGHT, ...SENTENCES_PRESENCE];
    return [...SENTENCES_PRESENCE, ...SENTENCES_LATE];
  }

  let lastSentenceText = '';
  function randomSentence() {
    const pool = getSentencePool().filter(s => s !== lastSentenceText);
    const t = pool[Math.floor(Math.random() * pool.length)];
    lastSentenceText = t;
    return t;
  }

  /* ═══════════════════════════════════
     WANDERING SENTENCE SYSTEM
     — teleports to new random position on each spawn
  ═══════════════════════════════════ */
  let activeSentence = null;
  let sentenceHue    = 180;

  // Mobile-safe margins
  function safeMargin() {
    return W < 480 ? 55 : 100;
  }

  function spawnSentence() {
    const text = randomSentence();
    sentenceHue = randHue();

    const el = document.createElement('div');
    el.className = 'wandering-sentence';
    el.textContent = text;
    el.style.opacity = '0';
    document.body.appendChild(el);

    // Wait one frame to get real dimensions after text is set
    requestAnimationFrame(() => {
      const elW = Math.min(el.offsetWidth, W * 0.88);
      const elH = el.offsetHeight;
      const m   = safeMargin();

      // Random position guaranteed not to clip edges
      const maxX = W - elW / 2 - m;
      const minX = elW / 2 + m;
      const maxY = H - elH / 2 - m;
      const minY = elH / 2 + m;

      const x = minX + Math.random() * Math.max(0, maxX - minX);
      const y = minY + Math.random() * Math.max(0, maxY - minY);

      el.style.left = x + 'px';
      el.style.top  = y + 'px';

      // Tiny nudge delay so opacity transition fires
      requestAnimationFrame(() => { el.classList.add('alive'); });

      const obj = {
        el, text,
        x, y,
        hue: sentenceHue,
        phase: 'alive',
        revealAcc: 0,
        born: Date.now(),
      };
      activeSentence = obj;
    });
  }

  function updateSentence() {
    if (!activeSentence) return;
    const s = activeSentence;
    if (s.phase === 'dissolving') return;

    // Reveal check
    const revealed = isRevealedByPointer(s.el);
    s.el.classList.toggle('revealed', revealed);

    if (revealed) {
      s.revealAcc = Math.min(1, s.revealAcc + 0.006);
    } else {
      s.revealAcc = Math.max(0, s.revealAcc - 0.002);
    }

    // Dissolve after 90s or if deeply revealed
    const age = (Date.now() - s.born) / 1000;
    if ((age > 90 || s.revealAcc >= 1) && s.phase === 'alive') {
      s.phase = 'dissolving';
      dissolveSentence(s);
    }
  }

  function dissolveSentence(s) {
    const r = s.el.getBoundingClientRect();
    const cx = r.left + r.width  / 2;
    const cy = r.top  + r.height / 2;
    spawnDissolution(cx, cy, s.text, s.hue);
    s.el.style.transition = 'opacity 1.2s ease';
    s.el.style.opacity = '0';
    setTimeout(() => {
      s.el.remove();
      activeSentence = null;
      const delay = 2500 + Math.random() * 3500;
      setTimeout(spawnSentence, delay);
    }, 1300);
  }

  setTimeout(spawnSentence, 4000);

  /* ═══════════════════════════════════
     PAYMENT ENTITY
     — teleports to new random position on text change
  ═══════════════════════════════════ */
  const PAY_TEXTS = [
    "Keep It Alive",
    "Leave A Trace",
    "Feed The Lights",
    "Continue The Signal",
    "Stay A Little Longer",
    "Keep The Dream Breathing",
    "The Lights Remember",
    "Keep This Existing",
    "Someone Already Did",
    "Leave Something Behind",
    "You Could Still Do More",
    "Add Another Thought",
  ];

  // Contextual subtitles for the payment modal
  const PAY_SUBS = [
    "You've been here long enough to know it's real.",
    "Something kept you here. Leave a trace of light.",
    "The ones who stay always understand eventually.",
    "A stranger already did this for you once.",
    "This only exists because someone cared enough.",
    "You found it. That already means something.",
  ];

  const payEntityEl = document.createElement('div');
  payEntityEl.id = 'pay-entity-dyn';
  document.body.appendChild(payEntityEl);

  const payState = {
    x: W * 0.7,
    y: H * 0.35,
    alive: false,
    textIdx: Math.floor(Math.random() * PAY_TEXTS.length),
  };

  function randomPayPosition() {
    const m = 130;
    // Also get element width to prevent clipping
    const elW = payEntityEl.offsetWidth || 180;
    const elH = payEntityEl.offsetHeight || 44;
    payState.x = Math.max(elW/2 + m, Math.min(W - elW/2 - m, m + Math.random() * (W - m*2)));
    payState.y = Math.max(elH/2 + m, Math.min(H - elH/2 - m, m + Math.random() * (H - m*2)));
    payEntityEl.style.left = payState.x + 'px';
    payEntityEl.style.top  = payState.y + 'px';
  }

  payEntityEl.textContent = PAY_TEXTS[payState.textIdx];

  function updatePayText() {
    // Fade out, teleport, fade in
    payEntityEl.style.opacity = '0';
    setTimeout(() => {
      payState.textIdx = (payState.textIdx + 1) % PAY_TEXTS.length;
      payEntityEl.textContent = PAY_TEXTS[payState.textIdx];
      randomPayPosition();
      setTimeout(() => { payEntityEl.style.opacity = '1'; }, 400);
    }, 800);
  }

  // Show payment entity after 25s
  setTimeout(() => {
    payState.alive = true;
    randomPayPosition();
    payEntityEl.style.opacity = '1';
    payEntityEl.style.pointerEvents = 'auto';
    setInterval(updatePayText, 14000);
  }, 25000);

  // Hover / click intensity
  let payHoverIntensity = 0;
  let payEnergyBoost    = 0;

  function updatePayEntity() {
    if (!payState.alive) return;
    const isOver = isRevealedByPointer(payEntityEl);

    if (isOver) {
      payHoverIntensity = Math.min(1, payHoverIntensity + 0.018);
      payEntityEl.style.color       = `rgba(255,255,255,${0.6 + payHoverIntensity * 0.4})`;
      payEntityEl.style.borderColor = `rgba(0,200,255,${0.4 + payHoverIntensity * 0.4})`;
      payEntityEl.style.boxShadow   = `0 0 ${12 + payHoverIntensity * 40}px rgba(0,200,255,${0.3 + payHoverIntensity*0.5}), 0 0 ${40 + payHoverIntensity*80}px rgba(0,200,255,${0.1 + payHoverIntensity*0.3})`;
      payEnergyBoost = Math.min(1, payEnergyBoost + 0.022);
    } else {
      payHoverIntensity = Math.max(0, payHoverIntensity - 0.01);
      payEntityEl.style.color       = 'rgba(0,0,0,1)';
      payEntityEl.style.borderColor = 'rgba(0,0,0,1)';
      payEntityEl.style.boxShadow   = 'none';
      payEnergyBoost = Math.max(0, payEnergyBoost - 0.01);
    }
  }

  // Click on pay entity
  function handlePayClick(cx, cy) {
    if (!payState.alive) return;
    const r = payEntityEl.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
      openPayOverlay();
    }
  }
  window.addEventListener('click',    e => handlePayClick(e.clientX, e.clientY));
  window.addEventListener('touchend', e => {
    const t = e.changedTouches[0];
    handlePayClick(t.clientX, t.clientY);
  });

  /* ═══════════════════════════════════
     PAYMENT OVERLAY
  ═══════════════════════════════════ */
  const payOverlay    = document.getElementById('pay-overlay');
  const payConfirm    = document.getElementById('pay-confirm');
  const payClose      = document.getElementById('pay-close');
  const payModalTitle = document.getElementById('pay-modal-title');
  const payModalSub   = document.getElementById('pay-modal-sub');
  const amountBtns    = document.querySelectorAll('.pay-amount-btn');
  let selectedAmount  = 1;

  amountBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      amountBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedAmount = parseInt(btn.dataset.amount);
    });
  });

  function openPayOverlay() {
    payModalTitle.textContent = PAY_TEXTS[payState.textIdx];
    // Pick contextual sub based on session time
    const subIdx = Math.min(Math.floor(sessionMinutes() / 2), PAY_SUBS.length - 1);
    payModalSub.innerHTML = PAY_SUBS[subIdx].replace('. ', '.<br>');
    payOverlay.classList.add('open');
  }
  payClose.addEventListener('click', () => payOverlay.classList.remove('open'));
  payOverlay.addEventListener('click', e => { if (e.target === payOverlay) payOverlay.classList.remove('open'); });

  payConfirm.addEventListener('click', () => {
    if (typeof Paddle !== 'undefined') {
      Paddle.Checkout.open({
        items: [{ priceId: 'YOUR_PADDLE_PRICE_ID', quantity: 1 }],
        settings: { displayMode: 'overlay', theme: 'dark', locale: 'en' },
        customData: { amount: selectedAmount },
      });
    } else {
      window.open('https://buy.paddle.com/product/YOUR_PADDLE_PRODUCT_ID', '_blank');
    }
    payOverlay.classList.remove('open');
  });

  /* ═══════════════════════════════════
     AUDIO SYSTEM
  ═══════════════════════════════════ */
  let audioCtx = null, masterGain = null;
  let muted = false, audioStarted = false;

  document.getElementById('mute-btn').addEventListener('click', () => {
    muted = !muted;
    if (masterGain) masterGain.gain.setTargetAtTime(muted ? 0 : 0.12, audioCtx.currentTime, 0.3);
    document.getElementById('mute-btn').textContent = muted ? '♪ UNMUTE' : '♪ MUTE';
  });

  function startAudio() {
    if (audioStarted) return;
    audioStarted = true;
    try {
      audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0;
      masterGain.connect(audioCtx.destination);
      masterGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 2.5);
      createDrone(55, 0.4); createDrone(110, 0.25); createDrone(165, 0.12);
      createShimmer();
    } catch(e) {}
  }

  function createDrone(freq, gain) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter();
    osc.type = 'sine'; osc.frequency.value = freq;
    const lfo = audioCtx.createOscillator();
    const lfog = audioCtx.createGain();
    lfo.frequency.value = 0.05 + Math.random() * 0.04;
    lfog.gain.value = freq * 0.004;
    lfo.connect(lfog); lfog.connect(osc.frequency); lfo.start();
    filt.type = 'lowpass'; filt.frequency.value = 800;
    g.gain.value = gain;
    osc.connect(filt); filt.connect(g); g.connect(masterGain); osc.start();
  }

  function createShimmer() {
    if (!audioCtx) return;
    function tick() {
      if (!audioCtx || muted) { setTimeout(tick, 2000); return; }
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.value = 880 + Math.random() * 1200;
      g.gain.setValueAtTime(0, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0.018, audioCtx.currentTime + 0.4);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.5);
      osc.connect(g); g.connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + 2.6);
      setTimeout(tick, 1800 + Math.random() * 3000);
    }
    setTimeout(tick, 2000);
  }

  function reactAudio() {
    if (!audioCtx || !masterGain || muted) return;
    const spd = Math.min(pointerSpeed / 40, 1);
    masterGain.gain.setTargetAtTime(0.12 + spd * 0.06, audioCtx.currentTime, 0.1);
  }

  window.addEventListener('click',      () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); });
  window.addEventListener('touchstart', () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, { passive: true });

  /* ═══════════════════════════════════
     CURSOR COLOR
  ═══════════════════════════════════ */
  function updateCursorColor() {
    let bestHue = 180, bestDist = Infinity;
    for (const orb of orbs) {
      const d = Math.hypot(orb.x - mx, orb.y - my);
      if (d < bestDist) { bestDist = d; bestHue = orb.hue; }
    }
    cursorDot.style.background = `hsl(${bestHue},100%,75%)`;
    cursorDot.style.boxShadow  = `0 0 10px 3px hsl(${bestHue},100%,60%)`;
  }

  /* ═══════════════════════════════════
     SESSION GLYPH
  ═══════════════════════════════════ */
  const sessionGlyph = document.getElementById('session-glyph');
  setInterval(() => {
    const a = 0.04 + sessionIntensity() * 0.18;
    sessionGlyph.style.color = `rgba(255,255,255,${a})`;
  }, 3000);

  /* ═══════════════════════════════════
     MAIN LOOP
  ═══════════════════════════════════ */
  function loop() {
    const fade = 0.15 + Math.min(pointerSpeed / 200, 0.06);
    ctx.fillStyle = `rgba(0,0,0,${fade})`;
    ctx.fillRect(0, 0, W, H);

    drawSparkles();
    updateDrawDiss();

    const energy = payEnergyBoost + Math.min(pointerSpeed / 80, 0.5);
    for (const orb of orbs) { orb.update(energy); orb.draw(energy); }

    updateSentence();
    updatePayEntity();
    updateCursorColor();
    reactAudio();

    requestAnimationFrame(loop);
  }

  loop();

})();
</script>

  }
</script>
